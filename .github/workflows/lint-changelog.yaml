name: Changelog Utils

on:
  pull_request:

permissions:
  pull-requests: write
  contents: read

jobs:
  check-changelog:
    runs-on: ubuntu-latest

    steps:
    - name: Check out the repository
      uses: actions/checkout@v4

    - name: Check diff
      uses: ./
      with:
          command: check-diff

    - name: Run changelog linter
      uses: ./
      with:
          github_token: ${{ secrets.GITHUB_TOKEN }}


